version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: strikeball-postgres
    environment:
      POSTGRES_DB: strikeballdb
      POSTGRES_USER: strikeballuser
      POSTGRES_PASSWORD: strikeballpassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strikeballuser -d strikeballdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - strikeball-network

  # Strikeball Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: strikeball-server
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=strikeballdb;Username=strikeballuser;Password=strikeballpassword123;Port=5432"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - strikeball-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  strikeball-network:
    driver: bridge
